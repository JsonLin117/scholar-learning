version: '3.8'

services:
  jobmanager:
    image: flink:1.20-scala_2.12
    container_name: scholar-flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - FLINK_PROPERTIES=jobmanager.rpc.address: jobmanager

  taskmanager:
    image: flink:1.20-scala_2.12
    container_name: scholar-flink-taskmanager
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      - FLINK_PROPERTIES=jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
